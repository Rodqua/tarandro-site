name: 🌸 EVJF — Migration & Seed

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Que veux-tu faire ?"
        required: true
        default: migrate-and-seed
        type: choice
        options:
          - migrate-and-seed
          - migrate-only
          - seed-only

jobs:
  evjf-setup:
    name: 🌸 Setup EVJF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: 🗄️ Migration Prisma
        if: ${{ inputs.action == 'migrate-and-seed' || inputs.action == 'migrate-only' }}
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: 🌱 Seed participantes EVJF
        if: ${{ inputs.action == 'migrate-and-seed' || inputs.action == 'seed-only' }}
        run: npx tsx prisma/seed-evjf.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: ✅ Résumé
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Action '${{ inputs.action }}' terminée !"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "👑 Bibite (organisateur)"
          echo "🥂 Alexiane, Louis, Iyad, Marion, Simon, Sylvain"
          echo "📅 EVJF : 19-21 juin 2026"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
